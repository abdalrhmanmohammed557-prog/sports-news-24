<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بوابة الرياضة 24 - تغطية شاملة</title>
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f4f4f4; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: #fff; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .news-item { padding: 25px; border-bottom: 2px solid #f0f0f0; cursor: pointer; transition: 0.4s; }
        .news-item:hover { background: #fff8f8; border-right: 8px solid #e21b1b; }
        #details-view { display: none; }
        .back-btn { background: #222; color: #fff; padding: 12px 25px; border: none; cursor: pointer; border-radius: 8px; font-weight: bold; margin-bottom: 30px; }
        h1 { color: #e21b1b; text-align: center; margin-bottom: 40px; }
        .details-text { line-height: 2.4; font-size: 20px; color: #333; text-align: justify; padding: 10px; }
    </style>
</head>
<body>
<div class="container">
    <div id="main-view">
        <h1>أهم التغطيات الرياضية الحصرية</h1>
        <div id="news-list"></div>
    </div>
    <div id="details-view">
        <button class="back-btn" onclick="goBack()">← العودة للرئيسية</button>
        <h2 id="det-title" style="color: #e21b1b;"></h2>
        <p id="det-text" class="details-text"></p>
    </div>
</div>

<script>
    const newsData = [
        {
            id: 1, 
            title: "موقف محمد صلاح الغامض في ليفربول", 
            details: "لا يزال الغموض يكتنف مستقبل النجم المصري محمد صلاح مع نادي ليفربول، حيث يرفض وكيله رامي عباس حتى اللحظة الإفصاح عن الوجهة القادمة. يشدد عباس في تصريحاته الأخيرة على أن صلاح لم يتخذ قراراً نهائياً بشأن النادي الذي سيمثله في موسم 2026-2027، مؤكداً أن المفاوضات لا تزال في مراحلها الأولية. تترقب جماهير الكرة العالمية، وخاصة المصرية، أي إعلان رسمي قد يصدر خلال الأيام القليلة القادمة لتوضيح خارطة طريق الفرعون المصري. تتردد أنباء عن عروض ضخمة، لكن القرار النهائي يعتمد على رؤية صلاح الرياضية للمستقبل ومشاركته في البطولات الكبرى. يسعى اللاعب حالياً لضمان الانتقال لمشروع رياضي طموح يناسب إمكانياته الفنية العالية، وهو ما يجعل وكيله يتعامل بذكاء شديد مع كل العروض المقدمة لضمان أفضل خيار ممكن لمسيرته الأسطورية."
        },
        {
            id: 2, 
            title: "الأهلي المصري يعزز هجومه بصفقات نارية", 
            details: "شهدت الساعات الماضية تحركات مكثفة من مجلس إدارة النادي الأهلي لحسم ملفات الهجوم قبل بداية معسكر الإعداد للموسم الجديد. أعلن النادي رسمياً عن ضم الثنائي أقطاي عبد الله وعلي محمود من صفوف نادي إنبي، في إطار خطة النادي لتدعيم القوام الأساسي بعناصر شابة وموهوبة. لم تتوقف الصفقات عند هذا الحد، حيث نجح مسؤولو القلعة الحمراء في التوصل لاتفاق نهائي لضم المهاجم المغربي سفيان بنجديدة من المغرب الفاسي، ليكون إضافة قوية لخط الهجوم. وفي سياق متصل، تكثف الإدارة مفاوضاتها لضم المهاجم الجزائري منصف بقرار من دينامو زغرب، حيث تم تقديم عرض رسمي بقيمة 3 ملايين يورو، وما زالت المفاوضات قائمة للحصول على موافقة اللاعب النهائية. يأتي هذا التدعيم الهجومي تلبيةً لرغبة المدير الفني مارسيل كولر في خلق تنافسية عالية، مع استمرار الاهتمام بعودة المهاجم الكونغولي والتر بواليا أو خيارات أخرى مثل موليكا لتأمين العمق الهجومي في البطولات القارية."
        },
        {
            id: 3, 
            title: "الزمالك يواجه تحديات إدارية صعبة في الميركاتو", 
            details: "يواجه نادي الزمالك تحديات كبيرة في سوق الانتقالات الحالي، حيث تظل عقوبة إيقاف القيد سارية بعد رفض المحكمة الرياضية الدولية (كاس) الطلب المستعجل الذي قدمه النادي. يعمل مجلس الإدارة بشكل متواصل على تسوية المستحقات المالية المتأخرة لعدد من اللاعبين السابقين والمدربين، وهي الخطوة الوحيدة لإنهاء أزمة القيد ورفع الحظر. وعلى صعيد آخر، وافق النادي رسمياً على احتراف المدافع الواعد حسام عبد المجيد في صفوف نادي لودوجوريتس البلغاري، في تجربة احترافية جديدة تعكس تطور اللاعب. تحاول إدارة النادي حالياً إعادة ترتيب البيت من الداخل، والبحث عن حلول قانونية لجدولة الديون، خاصة وأن الفريق يحتاج لتدعيمات عاجلة في مراكز الدفاع ووسط الملعب للمنافسة في الموسم القادم. تضع الجماهير آمالها على نجاح الإدارة في تجاوز هذه العقبات الإدارية في أسرع وقت ممكن، لتفادي تكرار سيناريوهات الموسم الماضي التي أثرت على استقرار الفريق فنياً وإدارياً."
        },
        {
            id: 4, 
            title: "بيراميدز يبرم صفقات دفاعية ويترقب حمدي فتحي", 
            details: "واصل نادي بيراميدز تحركاته القوية في الميركاتو الصيفي لتعزيز خطوطه الدفاعية استعداداً للمنافسات المحلية والقارية. حسم النادي تعاقده مع المدافع إياد العسقلاني القادم من نادي روستوف الروسي، كما نجح في ضم أحمد حجازي في صفقة انتقال حر بعد رحيله عن نادي نيوم السعودي. يأتي هذا التحرك الدفاعي لسد الثغرات التي عانى منها الفريق في الموسم الماضي، حيث يسعى النادي لبناء دفاع حديدي قادر على مواجهة أقوى الفرق. في الوقت نفسه، يترقب مسؤولو بيراميدز الموقف النهائي لنجم وسط المنتخب المصري، حمدي فتحي، الذي يلعب حالياً في صفوف الوكرة القطري، حيث لا تزال المفاوضات جارية بين الطرفين دون التوصل لاتفاق نهائي. كما يكثف الفريق جهوده للبحث عن مهاجم أجنبي من العيار الثقيل لتعويض رحيل الكونغولي فيستون ماييلي، الذي انتهى عقده مع النادي. يهدف بيراميدز من خلال هذه التعاقدات إلى بناء فريق بطل قادر على المنافسة على كافة الألقاب، مستغلاً الإمكانيات المالية الضخمة المتاحة لديه."
        },
        {
            id: 5, 
            title: "تغيرات جوهرية في المشهد الأوروبي", 
            details: "يشهد سوق الانتقالات الأوروبي تحركات واسعة، حيث أعلن نادي تشيلسي عن صفقة قياسية بضم مورجان روجرز من أستون فيلا مقابل 117 مليون إسترليني، في عقد يمتد لعام 2032. وعلى الجانب الآخر، قرر ريال مدريد رسمياً الانسحاب من صفقة رودري، مفضلاً التركيز على مواهبه الشابة الحالية بدلاً من إنفاق ميزانيات ضخمة في خط الوسط. في إنجلترا، يسعى توتنهام بجدية لضم الجناح البرازيلي سافينيو بتوصية من المدرب دي زيربي، بينما يراقب ميلان وضع فيل فودين مع تعقيد الصفقة مالياً. أما في إسبانيا، فقد منح برشلونة مهلة للمهاجم جوليان ألفاريز حتى نهاية يوليو لحسم موقفه، في حين رفض أتلتيكو مدريد بيع اللاعب جملة وتفصيلاً. كما شهد الميركاتو انتقالات لافتة مثل انتقال ترينكاو إلى أهلي جدة، وعودة أوباميانج للدوري الإسباني عبر بوابة ديبورتيفو لاكورونا، مع استمرار أرسنال في محاولاته لضم كريستوس تزوليس لتعويض رحيل نجومه. تعكس هذه التحركات رغبة الأندية الكبرى في إعادة بناء صفوفها وتأمين احتياجاتها الفنية قبل انطلاق الموسم الأوروبي المشتعل."
        },
        {
            id: 6, 
            title: "ختام مونديال 2026 وتغييرات فنية عالمية", 
            details: "شهدت ختام منافسات كأس العالم 2026 أحداثاً تاريخية ستظل محفورة في ذاكرة عشاق كرة القدم لفترة طويلة. نجح المنتخب الإنجليزي في تحقيق الميدالية البرونزية بعد مواجهة درامية ومثيرة انتهت بفوزهم على المنتخب الفرنسي بنتيجة 6-4، في مباراة شهدت غزارة تهديفية غير مسبوقة. وفي أعقاب البطولة، أعلن الاتحاد الفرنسي لكرة القدم رسمياً رحيل المدير الفني ديدييه ديشامب، ليضع حداً لحقبة ذهبية مليئة بالبطولات والإنجازات التي حققها مع الديوك. تترقب الجماهير العالمية بشغف المباراة النهائية الكبرى التي تجمع بين المنتخبين الأرجنتيني والإسباني، وهي مواجهة طال انتظارها لتحديد بطل العالم الجديد في نسخة استثنائية. البطولة بشكل عام نجحت في تسليط الضوء على جيل جديد من المواهب الصاعدة، وأثبتت أن التطور التكتيكي في كرة القدم مستمر بلا هوادة. مع إسدال الستار على هذا المونديال، تستعد المنتخبات والاتحادات الوطنية لتقييم تجاربها وتحديد مساراتها الفنية القادمة، خاصة مع توفر وقت كافٍ للأندية لاستعادة لاعبيها قبل بداية الدوريات العالمية في قاراتها."
        }
    ];

    function renderList() {
        const list = document.getElementById('news-list');
        newsData.forEach(n => {
            list.innerHTML += `<div class="news-item" onclick="showDetails(${n.id})"><h3>${n.title}</h3></div>`;
        });
    }

    function showDetails(id) {
        const news = newsData.find(n => n.id === id);
        document.getElementById('det-title').innerText = news.title;
        document.getElementById('det-text').innerText = news.details;
        document.getElementById('main-view').style.display = 'none';
        document.getElementById('details-view').style.display = 'block';
        window.scrollTo(0,0);
    }

    function goBack() {
        document.getElementById('main-view').style.display = 'block';
        document.getElementById('details-view').style.display = 'none';
    }

    renderList();
</script>
</body>
</html>
