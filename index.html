<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title أخبار الرياضة 24 | أخبار الرياضة</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
        header { background: #1a1a1a; color: white; padding: 15px; text-align: center; }
        .nav { display: flex; justify-content: center; background: #1a1a1a; padding-bottom: 10px; flex-wrap: wrap; }
        .nav button { background: #e21b1b; color: white; border: none; padding: 10px 15px; margin: 5px; border-radius: 5px; cursor: pointer; }
        .container { max-width: 600px; margin: auto; background: #fff; padding: 20px; }
        .news-item { border-bottom: 1px solid #ddd; padding: 15px; cursor: pointer; }
        .news-item:hover { background: #f9f9f9; }
        .tag { color: #e21b1b; font-size: 12px; font-weight: bold; }
        #details-view { display: none; padding: 20px; }
        .back-btn { background: #333; color: white; padding: 10px; cursor: pointer; border: none; margin-bottom: 20px; }
    </style>
</head>
<body>

<header><h1>الرياضة 24</h1></header>

<div class="nav">
    <button onclick="filterNews('الكل')">الرئيسية</button>
    <button onclick="filterNews('أخبار محلية')">أخبار محلية</button>
    <button onclick="filterNews('أخبار عالمية')">أخبار عالمية</button>
    <button onclick="filterNews('أخرى')">أخرى</button>
</div>

<div class="container" id="main-view">
    <h3 id="section-title">آخر الأخبار</h3>
    <div id="news-list"></div>
</div>

<div id="details-view" class="container">
    <button class="back-btn" onclick="goBack()">← العودة للرئيسية</button>
    <h2 id="det-title"></h2>
    <p id="det-text" style="line-height: 1.8; font-size: 18px;"></p>
</div>

<script>
    const newsData = [
        {id: 1, tag: "أخبار محلية", title: "الزمالك يعلن احتراف حسام عبد المجيد في بلغاريا", details: "أعلن نادي الزمالك رسمياً عن موافقته على احتراف المدافع حسام عبد المجيد في نادي لودوجوريتس البلغاري. تمت الصفقة بعد سلسلة من المفاوضات لتعزيز تواجد اللاعبين المصريين في أوروبا، ويسعى اللاعب من خلالها لتطوير مستواه البدني والفني. الزمالك سيحصل على مقابل مادي جيد بجانب نسبة من إعادة البيع مستقبلاً. يمثل رحيل حسام خطوة كبيرة لمسيرته الاحترافية في ظل متابعة كشافي الأندية الأوروبية له. إدارة النادي تدرس حالياً بدائل دفاعية لتعويض رحيل أحد أهم ركائز الفريق في الموسم الماضي. ينتظر اللاعب المشاركة في معسكر فريقه الجديد للانسجام سريعاً مع أسلوب اللعب هناك."},
        {id: 2, tag: "أخبار عالمية", title: "صفقة قياسية لنادي تشيلسي بضم مورجان روجرز", details: "توصل نادي تشيلسي إلى اتفاق رسمي لضم مورجان روجرز من أستون فيلا في صفقة بلغت قيمتها 117 مليون جنيه إسترليني. الصفقة تعد من الأعلى في تاريخ الدوري الإنجليزي وتأتي ضمن ثورة تصحيح في قلعة البلوز. اللاعب وقع عقداً يمتد حتى عام 2032، مما يعكس ثقة الإدارة في موهبته الكبيرة. تحت قيادة المدرب تشابي ألونسو، يسعى تشيلسي لتكوين فريق قادر على المنافسة على الألقاب الكبرى محلياً وقارياً. الصفقة أثارت جدلاً واسعاً نظراً لضخامة المبلغ المدفوع مقابل لاعب شاب. روجرز يمتلك إمكانيات بدنية وفنية تمكنه من قيادة خط وسط تشيلسي لسنوات طويلة قادمة."},
        {id: 3, tag: "أخرى", title: "إنجلترا تحصد البرونزية ورحيل ديشامب عن فرنسا", details: "توج المنتخب الإنجليزي بالميدالية البرونزية في كأس العالم 2026 بعد فوز تاريخي على فرنسا بنتيجة 6-4 في لقاء مثير. في المقابل، أعلن الاتحاد الفرنسي رحيل المدير الفني ديدييه ديشامب عقب انتهاء مشوار الفريق في البطولة. ديشامب ينهي حقبة مميزة مليئة بالإنجازات مع المنتخب الفرنسي، مما يفتح الباب لمرحلة انتقالية جديدة للديوك. المنتخب الإنجليزي أثبت تطور مستواه الهجومي تحت ضغط مباريات المونديال. المباراة كانت واحدة من أكثر مباريات البطولة تهديفاً، مما يعكس الشجاعة التكتيكية للمنتخبين. الجماهير العالمية تترقب هوية المدير الفني القادم لفرنسا لضمان الاستمرارية في المنافسات الدولية القادمة."},
        {id: 4, tag: "أخبار محلية", title: "الأهلي يضم ثنائي إنبي ويقترب من بنجديدة", details: "أعلن النادي الأهلي تعاقده مع أقطاي عبد الله وعلي محمود من صفوف نادي إنبي. في الوقت نفسه، أكد المغرب الفاسي انتقال المهاجم سفيان بنجديدة إلى صفوف القلعة الحمراء. يسعى كولر لتدعيم هجوم الفريق بشكل كامل قبل انطلاق الموسم الجديد. الإدارة تعمل بجد لحسم ملف المهاجم الجزائري منصف بقرار في الساعات القادمة. هذه التحركات تأتي في إطار استراتيجية الأهلي لتعزيز صفوفه للارتباطات القارية القادمة. كما يتم تصفية القائمة من بعض اللاعبين لضمان كفاءة التشكيل الأساسي قبل بدء المعسكر الإعدادي للفريق."},
        {id: 5, tag: "أخبار عالمية", title: "توتنهام يكثف مفاوضاته لضم سافينيو", details: "يواصل نادي توتنهام هوتسبير ضغطه للتعاقد مع الجناح البرازيلي سافينيو لتدعيم خطه الهجومي. يرى المدرب روبرتو دي زيربي أن مهارات اللاعب هي الحلقة المفقودة في منظومته التكتيكية. الصفقة تأتي ضمن خطة النادي لتعزيز الفريق بمواهب شابة قادرة على صنع الفارق في الدوري الإنجليزي. المفاوضات تتسم بالجدية في ظل رغبة اللاعب في خوض تجربة جديدة خارج مانشستر سيتي. توتنهام يسعى لحسم التفاصيل المالية في أقرب وقت لتفادي دخول أندية أخرى في السباق. سافينيو أبدى انفتاحاً على الانتقال إذا ما تم ضمان دور محوري له في التشكيلة الأساسية للمدرب دي زيربي."},
        {id: 6, tag: "أخبار عالمية", title: "ريال مدريد يغلق ملف ضم رودري", details: "قرر نادي ريال مدريد رسمياً الانسحاب من صفقة ضم الإسباني رودري، مفضلاً التركيز على تدعيم مراكز أخرى. إدارة الملكي ترى أن عمق تشكيلة خط الوسط الحالي كافٍ للمنافسة على جميع الألقاب. الاستراتيجية الحالية تركز على تأمين عقود النجوم الصاعدة في الفريق وتمديد فتراتهم. الميزانية ستوجه لتعزيز الخطوط التي تعاني من نقص فعلي. ريال مدريد يواصل الاعتماد على سياسة التوازن المالي وتجنب الصفقات المبالغ فيها. المدرب يرى أن الانسحاب من هذه الصفقة يمنح مرونة أكبر في التعامل مع الميركاتو الصيفي الحالي بكل هدوء."},
        {id: 7, tag: "أخبار عالمية", title: "مستقبل ألفاريز يثير الجدل في برشلونة وأتلتيكو", details: "لا يزال ملف انتقال الأرجنتيني جوليان ألفاريز غامضاً بعد تمسك أتلتيكو مدريد بـ \"ليس للبيع\". برشلونة منح اللاعب مهلة حتى نهاية يوليو لحسم موقفه من الانتقال. ألفاريز يواجه ضغوطاً من عدة أندية كبرى في أوروبا ترغب في الحصول على خدماته. إدارة أتلتيكو ترفض كل العروض المقدمة، مؤكدة أهميته في مشروع النادي. اللاعب في موقف صعب بين رغبته في التحدي الجديد وبين التزامه مع ناديه الحالي. الجماهير تترقب قراره النهائي في الأيام القليلة القادمة قبل إغلاق نافذة الانتقالات. هذا الملف يعتبر من أكثر ملفات الميركاتو تعقيداً هذا الموسم."},
        {id: 8, tag: "أخبار عالمية", title: "أرسنال يسعى لضم كريستوس تزوليس", details: "تقارير تشير إلى اقتراب أرسنال من حسم صفقة جناح كلوب بروج كريستوس تزوليس. تأتي الصفقة لتعويض رحيل لياندرو تروسارد المنتقل إلى بشكتاش التركي مؤخراً. أرسنال يطمح لتدعيم أطراف الملعب بمهارات عالية لزيادة الفعالية الهجومية. المفاوضات قطعت شوطاً كبيراً في الساعات الأخيرة. تزوليس يمثل خياراً تكتيكياً مهماً للمدرب في الموسم الجديد. إتمام الصفقة مرهون بالاتفاق على الشروط الشخصية مع اللاعب وناديه. المدفعجية يخططون للعودة بقوة للمنافسة على لقب الدوري الإنجليزي."},
        {id: 9, tag: "أخبار عالمية", title: "أهلي جدة يضم البرتغالي فرانسيسكو ترينكاو", details: "أعلن نادي أهلي جدة عن تعاقده رسمياً مع الجناح البرتغالي فرانسيسكو ترينكاو قادماً من سبورتنج لشبونة. الصفقة كلفت خزينة النادي 45 مليون دولار لتدعيم صفوف الفريق للموسم المقبل. ترينكاو يعد إضافة قوية للهجوم الأهلاوي في الدوري السعودي. اللاعب وقع عقداً طويل الأمد طامحاً لتقديم مستويات مميزة. هذه الصفقة تندرج ضمن خطة النادي لجذب أسماء عالمية لتعزيز المنافسة. الجماهير استقبلت الخبر بحماس كبير نظراً لخبرة اللاعب الكبيرة. اللاعب من المتوقع أن يلتحق بمعسكر الفريق التحضيري سريعاً."},
        {id: 10, tag: "أخبار عالمية", title: "يوهان مانزامبي ينضم لأستون فيلا", details: "نجح نادي أستون فيلا في حسم صفقة السويسري يوهان مانزامبي من فرايبورج مقابل 60 مليون يورو. الصفقة تعد قياسية للنادي السويسري ومن المتوقع أن تشكل فارقاً في تشكيلة الفيلانز. اللاعب وقع عقداً لمدة خمس سنوات بعد مفاوضات طويلة. أستون فيلا يطمح للمنافسة القوية في البطولات الأوروبية والمحلية. المهارات الفنية لمانزامبي ستضيف بعداً جديداً للهجوم. الإدارة تواصل استثماراتها لتعزيز الفريق بطلب من الجهاز الفني. اللاعب جاهز لخوض غمار تحدي الدوري الإنجليزي القوي."},
        {id: 11, tag: "أخرى", title: "أوباميانج يعود للدوري الإسباني مع ديبورتيفو لاكورونا", details: "عاد المهاجم الجابوني بيير إيميريك أوباميانج للدوري الإسباني عبر بوابة ديبورتيفو لاكورونا. الصفقة بلغت حوالي 1.5 مليون يورو بامتيازات إضافية بعقد حتى 2028. أوباميانج يأمل في استعادة توهجه بعد رحلة قصيرة في مارسيليا. اللاعب يمتلك خبرة كبيرة في الليجا الإسبانية ستساعد فريقه الجديد. العودة للدوري الإسباني تعتبر تحدياً شخصياً للاعب لإثبات قدراته التهديفية. جماهير ديبورتيفو استقبلت الصفقة بآمال كبيرة لإنقاذ الفريق في الموسم الجديد. التوقعات تشير إلى دور محوري للاعب في هجوم الفريق."},
        {id: 12, tag: "أخبار محلية", title: "الأهلي يكثف مفاوضاته لحسم صفقة المهاجم الأجنبي", details: "يسعى النادي الأهلي لإنهاء ملف المهاجم الأجنبي قبل معسكر الإعداد. كولر وضع مواصفات دقيقة للاعب المطلوب لدعم هجوم الفريق. المفاوضات جارية مع وكلاء في أفريقيا وأوروبا الشرقية لحسم الصفقة. الإدارة ترفض التسرع وتؤكد على ضرورة جودة الصفقة لدعم الفريق في البطولات القارية والمحلية. الوقت يداهم الفريق لكن هناك تفاؤل بحسم الأمور سريعاً. الجماهير تترقب هوية المهاجم الذي سيقود هجوم الأهلي في الموسم المقبل. المفاوضات تتسم بالسرية التامة لضمان عدم تعثرها."},
        {id: 13, tag: "أخبار محلية", title: "الزمالك يضع اللمسات الأخيرة لإنهاء أزمة القيد", details: "مجلس إدارة الزمالك يعمل بجدية لتسوية الديون المتأخرة لإنهاء إيقاف القيد. الاتفاقات جارية مع اللاعبين والمدربين لجدولة المستحقات. هذه الخطوة ضرورية لقيد الصفقات الجديدة لتدعيم الدفاع والوسط. الإدارة تؤكد التزامها الكامل بحل المشكلات القانونية لعودة الاستقرار للفريق. الجماهير تضع ثقتها في المجلس لإنهاء هذه الأزمة التي عرقلت مسيرة الفريق. القيد يعتبر أولوية قصوى لتدعيم الفريق بأسماء قادرة على المنافسة. الجميع يترقب انفراجة قريبة في الملف القانوني."},
        {id: 14, tag: "أخبار عالمية", title: "مانشستر سيتي يخطط لثورة في خط الوسط", details: "قرر بيب جوارديولا ضخ دماء جديدة في خط وسط السيتي بعد التتويج بلقب الدوري الإنجليزي. النادي يراقب مواهب شابة في الدوري الإسباني والألماني لإيجاد بدائل بعيدة المدى. الهدف هو الحفاظ على هيمنة الفريق محلياً وأوروبياً من خلال استراتيجية طويلة الأمد. السيتي يواصل استكشاف اللاعبين القادرين على استيعاب فلسفة جوارديولا. جوارديولا يرى أن التجديد ضرورة لضمان استمرار دوافع اللاعبين. الإدارة ستوفر كل الموارد المطلوبة لتحقيق رؤية المدرب. المنافسة على المواهب الشابة ستكون عنوان الصيف للسيتيزنس."},
        {id: 15, tag: "أخرى", title: "تعديلات شاملة في منظومة التحكيم والـ VAR", details: "قرر الاتحاد المصري لكرة القدم تطوير شامل لتقنية الفيديو (VAR) قبل الموسم الجديد. التطوير يشمل استقدام خبراء أجانب لتدريب الحكام وتحديث أجهزة الملاعب. هذه الخطوة جاءت استجابة لمطالب رفع كفاءة التحكيم وتقليل الأخطاء. الاتحاد يهدف للارتقاء بمستوى العدالة التحكيمية في الدوري المصري. الحكام سيخضعون لدورات مكثفة لضمان الاستخدام الأمثل للتقنية. الجماهير تأمل أن يقلل هذا التحديث من الجدل التحكيمي المستمر. الجهود مستمرة لتقديم موسم أكثر انضباطاً ومهنية."}
    ];

    function renderNews(filter = 'الكل') {
        const list = document.getElementById('news-list');
        list.innerHTML = '';
        const filtered = filter === 'الكل' ? newsData : newsData.filter(n => n.tag === filter);
        filtered.forEach(n => {
            list.innerHTML += `
                <div class="news-item" onclick="showDetails(${n.id})">
                    <span class="tag">${n.tag}</span>
                    <h2 style="font-size: 18px; margin: 5px 0;">${n.title}</h2>
                </div>`;
        });
    }

    function filterNews(tag) {
        document.getElementById('section-title').innerText = tag === 'الكل' ? 'آخر الأخبار' : tag;
        renderNews(tag);
    }

    function showDetails(id) {
        const n = newsData.find(x => x.id === id);
        document.getElementById('det-title').innerText = n.title;
        document.getElementById('det-text').innerText = n.details;
        document.getElementById('main-view').style.display = 'none';
        document.getElementById('details-view').style.display = 'block';
    }

    function goBack() {
        document.getElementById('main-view').style.display = 'block';
        document.getElementById('details-view').style.display = 'none';
    }

    renderNews();
</script>

</body>
</html>
