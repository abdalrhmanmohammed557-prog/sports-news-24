        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
        
        :root {
            --primary-color: #e21b1b;
            --secondary-color: #1a1a1a;
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #333333;
            --text-muted: #777777;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
        }

        /* الهيدر وشريط التنقل */
        header {
            background-color: var(--secondary-color);
            color: #ffffff;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
        }

        .logo {
            font-size: 24px;
            font-weight: 900;
            color: #ffffff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo span {
            color: var(--primary-color);
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 15px;
        }

        nav ul li a {
            color: #cccccc;
            text-decoration: none;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 5px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        nav ul li a:hover, nav ul li a.active {
            color: #ffffff;
            background-color: var(--primary-color);
        }

        /* محتوى الصفحة الرئيسي */
        main {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .section-header {
            margin-bottom: 25px;
            border-right: 5px solid var(--primary-color);
            padding-right: 15px;
        }

        .section-header h2 {
            font-size: 28px;
            font-weight: 700;
            color: var(--secondary-color);
        }

        /* شبكة الأخبار */
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .news-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .news-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        .news-img {
            width: 100%;
            height: 210px;
            object-fit: cover;
            background-color: #e1e1e1;
        }

        .news-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .news-tag {
            align-self: flex-start;
            background-color: rgba(226, 27, 27, 0.1);
            color: var(--primary-color);
            font-size: 12px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 4px;
            margin-bottom: 12px;
        }

        .news-content h3 {
            font-size: 18px;
            font-weight: 700;
            color: var(--secondary-color);
            margin-bottom: 10px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .news-content p {
            color: var(--text-muted);
            font-size: 14px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* صفحة تفاصيل الخبر */
        #details-page {
            display: none;
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .btn-back {
            background-color: var(--secondary-color);
            color: #ffffff;
            border: none;
            padding: 10px 20px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 20px;
            transition: background-color 0.3s ease;
        }

        .btn-back:hover {
            background-color: var(--primary-color);
        }

        .details-main-img {
            width: 100%;
            max-height: 500px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 25px;
        }

        #details-title {
            font-size: 32px;
            font-weight: 700;
            color: var(--secondary-color);
            margin-bottom: 20px;
            line-height: 1.4;
        }

        #details-text {
            font-size: 18px;
            color: #444444;
            text-align: justify;
        }

        /* الفوتر */
        footer {
            background-color: var(--secondary-color);
            color: #ffffff;
            text-align: center;
            padding: 20px;
            margin-top: 50px;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .header-container {

                gap: 15px;
            }
            nav ul {
                flex-wrap: wrap;
                justify-content: center;
            }
            #details-title {
                font-size: 24px;
            }
        }
    </style>
</head>

                image: "https://raw.githubusercontent.com/abdalrhmanmohammed557-prog/%D9%85%D9%88%D9%82%D8%B9-%D8%A7%D8%AE%D8%A8%D8%A7%D8%B1-%D8%B1%D9%8A%D8%A7%D8%B6%D9%87/main/1000324558.jpg",
                summary: "يتحرك النادي الأهلي بقوة لتدعيم صفوفه بالميركاتو الصيفي، حيث يقود مفاوضات مع الفلسطيني عمر فرج ويقترب من تمديد عقد بيرسي تاو...",
                text: "تشهد أروقة النادي الأهلي ثورة كبيرة وتغييرات واسعة في ملف الصفقات والميركاتو الصيفي الحالي بناءً على الرؤية الفنية، حيث يسعى المارد الأحمر بقوة لتدعيم مراكز الهجوم بصفقات سوبر قادرة على قيادة الفريق لمنصات التتويج المحلية والقارية.<br><br>ودخل مسؤولو القلعة الحمراء في مفاوضات متقدمة للغاية لضم المهاجم الدولي الفلسطيني عمر فرج كلاعب محلي، متزامناً مع جلسة الحسم الإيجابية التي عقدها النادي مع نجمه الجنوب أفريقي بيرسي تاو للاستمرار داخل جدران أسوار النادي لموسمين إضافيين."
            }
        };

        // دالة عرض الكروت بناءً على الفئة المحددة
        function renderNews(category = 'all') {
            const container = document.getElementById('news-container');
            container.innerHTML = '';
            
            Object.values(newsData).forEach(art => {
                if (category === 'all' || art.category === category) {
                    container.innerHTML += `
                        <div class="news-card" onclick="openNews(${art.id})">
                            <img class="news-img" src="${art.image}" alt="${art.title}">
                            <div class="news-content">
                                <span class="news-tag">${art.tag}</span>
                                <h3>${art.title}</h3>
                                <p>${art.summary}</p>
                            </div>
                        </div>
                    `;
                }
            });
        }

        // دالة الفلترة والتحكم بالتبويبات النشطة (Active)
        function filterCategory(category) {
            showMainPage();
            const titles = { 
                all: "آخر الأخبار والصفقات", 
                local: "أخبار محلية", 
                global: "أخبار عالمية", 
                others: "رياضات أخرى" 
            };
            document.getElementById('page-title').innerText = titles[category];

            // إزالة الكلاس الفعال من كل الأزرار
            document.querySelectorAll('nav ul li a').forEach(el => el.classList.remove('active'));
            
            // تحديد الزر المناسب وتنشيطه
            const activeId = category === 'all' ? 'cat-all' : category === 'local' ? 'cat-local' : category === 'global' ? 'cat-global' : 'cat-others';
            document.getElementById(activeId).classList.add('active');

            renderNews(category);
        }

        // فتح صفحة تفاصيل الخبر
        function openNews(id) {
            const item = newsData[id];
            document.getElementById('details-img').src = item.image;
            document.getElementById('details-title').innerText = item.title;
            document.getElementById('details-text').innerHTML = item.text;
            
            document.getElementById('main-page').style.display = 'none';
            document.getElementById('details-page').style.display = 'block';
            window.scrollTo(0, 0); // رفع الصفحة لأعلى لسهولة القراءة
        }

        // العودة للصفحة الرئيسية
        function showMainPage() {
            document.getElementById('details-page').style.display = 'none';
            document.getElementById('main-page').style.display = 'block';
        }

        // تشغيل العرض الأولي عند تحميل الصفحة مباشرة
        renderNews('all');
    </script>
</body>
</html>
