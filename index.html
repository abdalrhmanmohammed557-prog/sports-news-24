<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أخبار الرياضة 24 | تغطية شاملة للأخبار العالمية والمحلية</title>
    <style>
        /* إعدادات الخطوط والألوان العامة */
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
        
        :root {
            --primary-color: #e21b1b;
            --secondary-color: #1a1a1a;
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #333333;
            --text-muted: #777777;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
        }

        /* الهيدر وشريط التنقل */
        header {
            background-color: var(--secondary-color);
            color: #ffffff;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
        }

        .logo {
            font-size: 24px;
            font-weight: 900;
            color: #ffffff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        .logo span {
            color: var(--primary-color);
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 15px;
        }

        nav ul li a {
            color: #cccccc;
            text-decoration: none;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 5px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        nav ul li a:hover, nav ul li a.active {
            color: #ffffff;
            background-color: var(--primary-color);
        }

        /* محتوى الصفحة الرئيسي */
        main {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .section-header {
            margin-bottom: 25px;
            border-right: 5px solid var(--primary-color);
            padding-right: 15px;
        }

        .section-header h2 {
            font-size: 28px;
            font-weight: 700;
            color: var(--secondary-color);
        }

        /* شبكة الأخبار */
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .news-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .news-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        .news-img {
            width: 100%;
            height: 210px;
            object-fit: cover;
            background-color: #e1e1e1;
        }

        .news-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .news-tag {
            align-self: flex-start;
            background-color: rgba(226, 27, 27, 0.1);
            color: var(--primary-color);
            font-size: 12px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 4px;
            margin-bottom: 12px;
        }

        .news-content h3 {
            font-size: 18px;
            font-weight: 700;
            color: var(--secondary-color);
            margin-bottom: 10px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .news-content p {
            color: var(--text-muted);
            font-size: 14px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* صفحة تفاصيل الخبر */
        #details-page {
            display: none;
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .btn-back {
            background-color: var(--secondary-color);
            color: #ffffff;
            border: none;
            padding: 10px 20px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 20px;
            transition: background-color 0.3s ease;
        }

        .btn-back:hover {
            background-color: var(--primary-color);
        }

        .details-main-img {
            width: 100%;
            max-height: 500px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 25px;
        }

        #details-title {
            font-size: 32px;
            font-weight: 700;
            color: var(--secondary-color);
            margin-bottom: 20px;
            line-height: 1.4;
        }

        #details-text {
            font-size: 18px;
            color: #444444;
            text-align: justify;
        }

        /* الفوتر */
        footer {
            background-color: var(--secondary-color);
            color: #ffffff;
            text-align: center;
            padding: 20px;
            margin-top: 50px;
            font-size: 14px;
        }

        /* الشاشات الصغيرة */
        @media (max-width: 768px) {
            .header-container {
                flex-direction: column;
                gap: 15px;
            }
            nav ul {
                flex-wrap: wrap;
                justify-content: center;
            }
            #details-title {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>

    <!-- الهيدر ونظام التبويبات -->
    <header>
        <div class="header-container">
            <a onclick="filterCategory('all')" class="logo">أخبار الرياضة <span>24</span></a>
            <nav>
                <ul>
                    <li><a id="cat-all" class="active" onclick="filterCategory('all')">الرئيسية</a></li>
                    <li><a id="cat-local" onclick="filterCategory('local')">أخبار محلية</a></li>
                    <li><a id="cat-global" onclick="filterCategory('global')">أخبار عالمية</a></li>
                    <li><a id="cat-others" onclick="filterCategory('others')">رياضات أخرى</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- المحتوى الفعلي -->
    <main>
        <!-- الصفحة الرئيسية وشبكة الأخبار -->
        <div id="main-page">
            <div class="section-header">
                <h2 id="page-title">آخر الأخبار والصفقات</h2>
            </div>
            <div class="news-grid" id="news-container">
                <!-- الـ JavaScript هيملى الأخبار هنا تلقائياً -->
            </div>
        </div>

        <!-- صفحة تفاصيل الخبر -->
        <div id="details-page">
            <button class="btn-back" onclick="showMainPage()">← العودة للرئيسية</button>
            <h1 id="details-title"></h1>
            <img id="details-img" class="details-main-img" src="" alt="">
            <div id="details-text"></div>
        </div>
    </main>

    <!-- الفوتر -->
    <footer>
        <p>&copy; 2026 أخبار الرياضة 24 - جميع الحقوق محفوظة</p>
    </footer>

    <script>
        // تم ربط كل صورة بالخبر الصحيح بناءً على خريطتك الدقيقة
        const newsData = {
            1: {
                id: 1,
                category: "local",
                tag: "أخبار محلية",
                title: "رسمياً.. الزمالك يعلن احتراف حسام عبد المجيد في الدوري البلغاري",
                image: "صور (1).jpeg", // jpeg 1 حسام عبد المجيد
                summary: "أعلن مجلس إدارة نادي الزمالك برئاسة الكابتن حسين لبيب الموافقة الرسمية على رحيل مدافع الفريق الأول حسام عبد المجيد الأوروبي...",
                text: "أعلن مجلس إدارة نادي الزمالك برئاسة الكابتن حسين لبيب، بالتنسيق الكامل مع المدير الرياضي جون إدوارد، عن موافقته الرسمية النهائية على رحيل مدافع الفريق الأول لكرة القدم الشاب 'حسام عبد المجيد'، وذلك من أجل بدء تجربة احترافية أوروبية جديدة في صفوف نادي لودوجوريتس البلغاري الشهير.<br><br>وجاء هذا القرار المفصلي بعد استكمال كافة الإجراءات الإدارية المتبعة وتوقيع العقود، بالإضافة إلى تسوية الاتفاق المالي المناسب بين إدارة الناديين بما يضمن حقوق القلعة البيضاء الاستثمارية من الصفقة."
            },
            2: {
                id: 2,
                category: "local",
                tag: "أخبار محلية",
                title: "مهاجم مغربي جديد في الجزيرة.. سفيان بن جديدة يوقع للأهلي 3 سنوات رسمياً",
                image: "صور (4).jpeg", // jpeg 4 سفيان بن جديدة
                summary: "فجّر عباس، وكيل أعمال المهاجم المغربي سفيان بن جديدة لاعب فريق المغرب الفاسي، مفاجأة كبرى بإعلانه توقيع اللاعب رسمياً للأهلي...",
                text: "فجّر عباس، وكيل أعمال المهاجم المغربي المتألق سفيان بن جديدة لاعب فريق المغرب الفاسي، مفاجأة كبرى من العيار الثقيل بملف الانتقالات، بعدما أعلن رسمياً عن توقيع اللاعب على عقود انتقاله إلى صفوف النادي الأهلي المصري بعقد رسمي طويل الأمد يمتد لـ 3 مواسم كروية قادمة لتدعيم خط الهجوم."
            },
            3: {
                id: 3,
                category: "global",
                tag: "أخبار عالمية",
                title: "نهائي الأحلام يقترب.. ميسي ويامال يشعلان أسعار التذاكر و'فيفا' يتدخل لحماية اللاعبين",
                image: "صور (2).jpeg", // jpeg 2 نهائي كاس العالم
                summary: "مع اقتراب نهائي مونديال 2026، اشتعلت أسواق التذاكر لمشاهدة مواجهة الأجيال بين الأرجنتين وإسبانيا بقيادة ميسي ويامال...",
                text: "مع الاقتراب المثير للمحطة الأخيرة والنهائية لمونديال 2026 التاريخي، اشتعلت أسواق التذاكر حول العالم بشكل غير مسبوق لمشاهدة مواجهة الأجيال الكبرى المرتقبة بين الأرجنتين بقيادة الأسطورة ليونيل ميسي، وإسبانيا بقيادة النجم الشاب الواعد لامين يامال."
            },
            4: {
                id: 4,
                category: "global",
                tag: "أخبار عالمية",
                title: "إنجلترا تُقصي فرنسا بسداسية جنونية (6 - 4) ومبابي يصبح الهداف التاريخي للمونديال",
                image: "صور (7).jpeg", // jpeg 7 انجلترا وفرنسا
                summary: "في كبرى مفاجآت المونديال، نجح المنتخب الإنجليزي في الإطاحة بالديوك الفرنسية بعد مباراة تاريخية مجنونة انتهت بنتيجة (6 - 4)...",
                text: "في واحدة من أكبر وأعنف المفاجآت المدوية بالأدوار الإقصائية لبطولة كأس العالم، نجح المنتخب الإنجليزي في إخماد انتفاضة الديوك الفرنسية تماماً والإطاحة بهم خارج البطولة بعد مباراة ملحمية وتاريخية مجنونة انتهت بنتيجة عريضة صدمت جماهير باريس والعالم بواقع (6 - 4)."
            },
            5: {
                id: 5,
                category: "global",
                tag: "أخبار عالمية",
                title: "زلزال في الميركاتو الإنجليزي.. تشيلسي يحسم صفقة قياسية لضم مورجان روجرز بـ 117 مليون إسترليني",
                image: "صور (5).jpeg", // jpeg 5 روجرز وتشيلسي
                summary: "أشعل تشيلسي الميركاتو الصيفي بعد اتفاقه النهائي لضم الجناح الدولي المتألق مورجان روجرز من أستون فيلا بصفقة قياسية...",
                text: "أشعل نادي تشيلسي الإنجليزي سوق الانتقالات الصيفية الحالية بعد توصله إلى اتفاق نهائي وصادم مع إدارة نادي أستون فيلا للتعاقد مع الجناح واللاعب الدولي الإنجليزي المتألق 'مورجان روجرز'."
            },
            6: {
                id: 6,
                category: "global",
                tag: "أخبار عالمية",
                title: "تحرك تركي مفاجئ لضم محمد صلاح.. بشكتاش يعثر على 'الراعي المالي' لحسم الصفقة الهامّة",
                image: "صور.jpeg", // jpeg صور (IMG صلاح)
                summary: "كشفت تقارير صحفية عن تطورات مدوية بشأن مستقبل محمد صلاح؛ حيث نجح نادي بشكتاش التركي في توفير الدعم المالي لحسم الصفقة...",
                text: "كشفت تقارير صحفية رياضية موثوقة ومقربة من الملاعب الأوروبية عن تطورات مدوية وسريعة بشأن مستقبل قائد المنتخب الوطني المصري ونجم ليفربول الأسطوري محمد صلاح؛ حيث نجحت إدارة نادي بشكتاش التركي العريق في إحداث تحرك مفاجئ وجاد لضم اللاعب."
            },
            7: {
                id: 7,
                category: "others",
                tag: "رياضات أخرى",
                title: "بسبب الأوضاع الإقليمية.. 'فيا' يعلن رسمياً إلغاء سباقي فورمولا 1 في البحرين والسعودية",
                image: "صور (6).jpeg", // jpeg 6 فورمولا
                summary: "أعلن الاتحاد الدولي للسيارات (FIA) رسمياً عن إلغاء سباقي جائزة البحرين والسعودية الكبرى للفورمولا 1 بسبب الأوضاع بالمنطقة...",
                text: "أعلن الاتحاد الدولي للسيارات (FIA) ببيان رسمي عاجل، عن إلغاء سباقي جائزة البحرين الكبرى وجائزة السعودية الكبرى للسيارات بشكل نهائي."
            },
            8: {
                id: 8,
                category: "others",
                tag: "رياضات أخرى",
                title: "ديوكوفيتش يعود للعرش من جديد ويكتب التاريخ.. أرقام قياسية خيالية في عالم التنس",
                image: "صور (3).jpeg", // jpeg 3 دياكوفيتش
                summary: "حقق نوفاك ديوكوفيتش لقبه الـ 25 في الجراند سلام، معززاً رقمه القياسي كأعظم لاعب تنس في التاريخ بعد نهائي ماراثوني شديد الإثارة...",
                text: "حقق الأسطورة الصربي الحية نوفاك ديوكوفيتش إنجازاً إعجازياً جديداً يضاف إلى مسيرته المرصعة بالذهب والبطولات، وذلك بعد تربعه مجدداً على عرش التنس العالمي وحصده للقب الغالي رقم 25 في بطولات الجراند سلام الأربع الكبرى."
            },
            9: {
                id: 9,
                category: "local",
                tag: "أخبار محلية",
                title: "ميركاتو الأهلي يشتعل.. مفاوضات مكثفة مع المهاجم الفلسطيني عمر فرج وبيرسي تاو يحسم مصيره بالتجديد",
                image: "png (1) شبكة.png", // png(1) الاهلي
                summary: "يتحرك النادي الأهلي بقوة لتدعيم صفوفه بالميركاتو الصيفي، حيث يقود مفاوضات مع الفلسطيني عمر فرج ويقترب من تمديد عقد بيرسي تاو...",
                text: "تشهد أروقة النادي الأهلي ثورة كبيرة وتغييرات واسعة في ملف الصفقات والميركاتو الصيفي الحالي بناءً على الرؤية الفنية، حيث يسعى المارد الأحمر بقوة لتدعيم مراكز الهجوم."
            }
        };

        function renderNews(category = 'all') {
            const container = document.getElementById('news-container');
            container.innerHTML = '';
            
            Object.values(newsData).forEach(art => {
                if (category === 'all' || art.category === category) {
                    const safeImageSrc = encodeURIComponent(art.image).replace(/%20/g, ' ');
                    container.innerHTML += `
                        <div class="news-card" onclick="openNews(${art.id})">
                            <img class="news-img" src="${safeImageSrc}" alt="${art.title}">
                            <div class="news-content">
                                <span class="news-tag">${art.tag}</span>
                                <h3>${art.title}</h3>
                                <p>${art.summary}</p>
                            </div>
                        </div>
                    `;
                }
            });
        }

        function filterCategory(category) {
            showMainPage();
            const titles = { all: "آخر الأخبار والصفقات", local: "أخبار محلية", global: "أخبار عالمية", others: "رياضات أخرى" };
            document.getElementById('page-title').innerText = titles[category];

            document.querySelectorAll('nav ul li a').forEach(el => el.classList.remove('active'));
            const activeId = category === 'all' ? 'cat-all' : category === 'local' ? 'cat-local' : category === 'global' ? 'cat-global' : 'cat-others';
            document.getElementById(activeId).classList.add('active');

            renderNews(category);
        }

        function openNews(id) {
            const item = newsData[id];
            document.getElementById('details-img').src = encodeURIComponent(item.image).replace(/%20/g, ' ');
            document.getElementById('details-title').innerText = item.title;
            document.getElementById('details-text').innerHTML = item.text;
            
            document.getElementById('main-page').style.display = 'none';
            document.getElementById('details-page').style.display = 'block';
            window.scrollTo(0, 0);
        }

        function showMainPage() {
            document.getElementById('details-page').style.display = 'none';
            document.getElementById('main-page').style.display = 'block';
        }

        renderNews('all');
    </script>
</body>
</html>
