<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="google-site-verification" content="5ZAdplTZ0Wp3bQVP8WzmbG5csJWicTfCUM_XapK0Zt8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أخبار الرياضة 24 | قريباً</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            padding: 20px;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        h1 {
            color: #10b981;
            font-size: 2.5rem;
            margin-bottom: 15px;
        }
        .welcome-msg {
            font-size: 1.4rem;
            color: #ffffff;
            font-weight: bold;
            margin-bottom: 10px;
        }
        p {
            font-size: 1.2rem;
            color: #a3a3a3;
            line-height: 1.6;
            margin: 5px 0 25px 0;
        }
        .badge {
            background-color: #059669;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            display: inline-block;
            margin-bottom: 20px;
        }
        
        /* تنسيق مربعات العد التنازلي في المنتصف */
        .countdown-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
            direction: ltr;
        }
        .countdown-box {
            background-color: #1e1e1e;
            border: 1px solid #27272a;
            border-radius: 10px;
            padding: 15px 20px;
            min-width: 80px;
        }
        .countdown-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #10b981;
            display: block;
        }
        .countdown-label {
            font-size: 0.9rem;
            color: #71717a;
        }

        .footer {
            margin-top: 50px;
            border-top: 1px solid #27272a;
            padding-top: 20px;
            font-size: 0.95rem;
            color: #71717a;
            width: 100%;
        }
        .footer span {
            color: #10b981;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="badge">انتظرونا اليوم ⚽</div>
        <h1>موقع أخبار الرياضة 24</h1>
        <div class="welcome-msg">أهلاً بكم في منصتنا الرياضية الجديدة!</div>
        <p>انتظروا تغطية حصرية وشاملة لكافة الأخبار والمباريات الرياضية، المحلية منها والعالمية، فور حدوثها وبأعلى دقة.</p>
        
        <!-- قسم العد التنازلي بالوقت فقط -->
        <div class="countdown-container">
            <div class="countdown-box">
                <span class="countdown-number" id="hours">00</span>
                <span class="countdown-label">ساعة</span>
            </div>
            <div class="countdown-box">
                <span class="countdown-number" id="minutes">00</span>
                <span class="countdown-label">دقيقة</span>
            </div>
            <div class="countdown-box">
                <span class="countdown-number" id="seconds">00</span>
                <span class="countdown-label">ثانية</span>
            </div>
        </div>

        <div class="footer">
            <p>تصميم وتطوير: <span>عبدالرحمن منتصر ماهر</span></p>
        </div>
    </div>

    <script>
        // موعد الإطلاق: اليوم 19 يوليو 2026 الساعة 7 مساءً (19:00)
        const launchDate = new Date(2026, 6, 19, 19, 0, 0).getTime();

        const countdownFunction = setInterval(function() {
            const now = new Date().getTime();
            const distance = launchDate - now;

            // حساب الساعات والدقائق والثواني
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // عرض النتيجة
            document.getElementById("hours").innerText = hours < 10 ? "0" + hours : hours;
            document.getElementById("minutes").innerText = minutes < 10 ? "0" + minutes : minutes;
            document.getElementById("seconds").innerText = seconds < 10 ? "0" + seconds : seconds;

            // عند انتهاء الوقت
            if (distance < 0) {
                clearInterval(countdownFunction);
                document.querySelector(".countdown-container").innerHTML = "<p style='color:#10b981; font-weight:bold; font-size:1.5rem;'>تم إطلاق الموقع الآن! 🎉</p>";
            }
        }, 1000);
    </script>

</body>
</html>
